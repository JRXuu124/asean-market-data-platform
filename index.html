<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASEAN Market Intelligence | 东盟市场数据库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1a56db;
            --primary-dark: #1e40af;
            --secondary: #0e9f6e;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-700: #374151;
            --gray-900: #111827;
        }
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #f0f7ff 50%, #fef3f2 100%);
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(26, 86, 219, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(14, 159, 110, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(124, 58, 237, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* 专业数据表格样式 */
        .data-table {
            border-collapse: separate;
            border-spacing: 0;
        }
        
        .data-table th {
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .data-table td {
            border-bottom: 1px solid #f1f5f9;
        }
        
        .data-table tr:hover td {
            background-color: #f8fafc;
        }
        
        /* 专业卡片阴影 */
        .card-shadow {
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
        }
        
        .card-shadow:hover {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }
        
        /* 渐变按钮 */
        .btn-gradient {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: all 0.3s ease;
        }
        
        .btn-gradient:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -5px rgba(26, 86, 219, 0.2);
        }
        
        /* 东盟主题颜色 */
        .asean-flag {
            background: linear-gradient(135deg, 
                #ff0000 0%, #ff0000 20%, 
                #0000ff 20%, #0000ff 40%, 
                #ffffff 40%, #ffffff 60%, 
                #ff0000 60%, #ff0000 80%, 
                #0000ff 80%, #0000ff 100%);
        }
        
        /* 自定义滚动条 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 3px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        /* 导航激活状态 */
        .nav-item {
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%) scaleY(0);
            width: 4px;
            height: 0;
            background: linear-gradient(180deg, #1a56db, #0e9f6e);
            border-radius: 0 4px 4px 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .nav-item.active {
            background: linear-gradient(90deg, rgba(26, 86, 219, 0.08) 0%, rgba(26, 86, 219, 0.03) 100%);
            color: var(--primary);
            font-weight: 600;
        }
        
        .nav-item.active::before {
            transform: translateY(-50%) scaleY(1);
            height: 24px;
        }
        
        .nav-item:hover {
            background: rgba(26, 86, 219, 0.05);
            transform: translateX(2px);
        }
        
        .nav-item:hover i {
            transform: scale(1.1);
            transition: transform 0.2s ease;
        }
        
        /* 指标卡片 */
        .metric-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }
        
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #1a56db, #0e9f6e, #7c3aed);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }
        
        .metric-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -4px rgba(26, 86, 219, 0.15), 0 4px 8px -2px rgba(26, 86, 219, 0.1);
        }
        
        .metric-card:hover::before {
            transform: scaleX(1);
        }
        
        /* 渐变卡片 */
        .gradient-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
        
        .gradient-card-blue {
            background: linear-gradient(135deg, #1a56db 0%, #3b82f6 100%);
        }
        
        .gradient-card-green {
            background: linear-gradient(135deg, #0e9f6e 0%, #10b981 100%);
        }
        
        .gradient-card-purple {
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
        }
        
        /* AI面板 */
        .ai-panel {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }
        
        .ai-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #1a56db, #0e9f6e, #7c3aed);
        }
        
        /* 加载动画 */
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 1000px 100%;
            animation: shimmer 2s infinite;
        }
        
        /* 时间线样式 */
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 8px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            border: 3px solid white;
            box-shadow: 0 0 0 2px var(--primary);
        }
        
        /* 改进的按钮样式 */
        .btn-primary {
            background: linear-gradient(135deg, #1a56db 0%, #3b82f6 100%);
            color: white;
            padding: 0.625rem 1.25rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(26, 86, 219, 0.2);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(26, 86, 219, 0.3);
        }
        
        /* 改进的输入框 */
        input:focus {
            box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
        }
        
        /* 数据表格改进 */
        .data-table tbody tr {
            transition: all 0.2s ease;
        }
        
        .data-table tbody tr:hover {
            background: linear-gradient(90deg, rgba(26, 86, 219, 0.05) 0%, rgba(26, 86, 219, 0.02) 100%);
            transform: scale(1.01);
        }
        
        /* 统计卡片数字动画 */
        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .count-animate {
            animation: countUp 0.6s ease-out;
        }
        
        /* 加载状态改进 */
        .loading-spinner {
            border: 3px solid rgba(26, 86, 219, 0.1);
            border-top: 3px solid #1a56db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 卡片网格动画 */
        .card-grid {
            display: grid;
            gap: 1.5rem;
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 标签样式 */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .badge:hover {
            transform: scale(1.05);
        }
        
        /* 改进的滚动条 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(241, 245, 249, 0.5);
            border-radius: 4px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #cbd5e1, #94a3b8);
            border-radius: 4px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #94a3b8, #64748b);
        }

        /* --- 产品模块专有样式 --- */
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 1.5rem; background: white; border: 1px solid #f1f5f9; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="text-gray-900 antialiased">

    <script>
        // --- 核心逻辑 ---
        const API_BASE = "http://127.0.0.1:8000/api/v1";
        let currentCatName = "全品类";
        let currentCatId = null;
        let currentPage = 1;
        const pageSize = 60; // 设定每页60个商品

        const templates = {
            macro: `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

        function switchModule(key, btn) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(btn) btn.classList.add('active');
            const t = { macro:'宏观经济', products:'热销品类', consumer:'人群洞察', 'ai-assistant':'AI准入诊断', logistics:'关税计算', providers:'服务商库', legal:'法律法规', news:'经贸资讯', cultural:'文化常识' };
            document.getElementById('module-title').innerText = t[key];
            document.getElementById('page-title').innerText = t[key];
            const container = document.getElementById('content-container');
            container.innerHTML = templates[key] || `<div class="p-20 text-center text-gray-400">内容加载中...</div>`;
            if(key === 'products') {
                currentPage = 1; 
                fetchCategories();
            }
        }

        async function fetchCategories() {
            try {
                const res = await fetch(`${API_BASE}/categories`);
                const data = await res.json();
                const categories = [{category_id: null, category_name_cn: '全部'}, ...data];
                const nav = document.getElementById('category-nav');
                nav.innerHTML = categories.map((cat, idx) => `
                    <button onclick="selectCategory(${cat.category_id}, '${cat.category_name_cn}', this)" 
                            class="cat-btn px-5 py-2.5 rounded-xl border border-gray-200 text-sm font-semibold hover:border-blue-500 hover:text-blue-600 transition-all ${idx===0?'active':''}">
                        ${cat.category_name_cn}
                    </button>`).join('');
                selectCategory(null, '全部');
            } catch(e) { console.error("Category load failed"); }
        }

        async function selectCategory(id, name, btn) {
            currentCatName = name;
            currentCatId = id;
            currentPage = 1; // 切换分类时重置为第1页
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            document.getElementById('current-cat-display').innerText = name;
            fetchProducts(id, 1);
        }

        async function fetchProducts(catId, page = 1) {
            const grid = document.getElementById('product-grid');
            const loader = document.getElementById('product-loading');
            const pagin = document.getElementById('pagination-container');
            grid.innerHTML = ""; loader.classList.remove('hidden');
            
            try {
                const offset = (page - 1) * pageSize;
                let url = `${API_BASE}/products?limit=${pageSize}&offset=${offset}`;
                if (catId) url += `&category_id=${catId}`;

                const res = await fetch(url);
                const result = await res.json();

                // 核心逻辑修改：从后端返回的 result.total 获取动态总数
                const totalItems = result.total || 0; 
                const data = result.items || [];      
                const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));

                if (!data || data.length === 0) {
                    grid.innerHTML = `<div class="col-span-full py-20 text-center text-gray-300">本页暂无更多数据</div>`;
                    pagin.innerHTML = "";
                } else {
                    grid.innerHTML = data.map(p => `
                        <div class="product-card group shadow-sm">
                            <div class="relative h-48 bg-gray-50 overflow-hidden">
                                <img src="${p.main_image_url}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" onerror="this.src='https://placehold.co/400x400?text=Product'">
                                <div class="absolute top-3 right-3 bg-white/90 px-2 py-1 rounded text-[10px] font-bold shadow-sm">${p.brand || '跨境热销'}</div>
                            </div>
                            <div class="p-5">
                                <h5 class="text-sm font-bold text-gray-800 line-clamp-2 h-10 group-hover:text-blue-600">${p.product_title}</h5>
                                <div class="mt-4 flex items-center justify-between border-t pt-4">
                                    <span class="text-blue-600 font-extrabold text-lg">¥ ${p.price ? p.price.toFixed(2) : '0.00'} <span class="text-xs font-normal text-gray-400">起</span></span>
                                    <a href="${p.url}" target="_blank" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 hover:bg-blue-600 hover:text-white transition"><i class="fas fa-external-link-alt text-xs"></i></a>
                                </div>
                            </div>
                        </div>`).join('');
                    renderPagination(page, totalPages);
                }
            } catch(e) { 
                console.error(e);
                grid.innerHTML = `<div class="col-span-full text-center text-red-400">后端接口同步异常</div>`; 
            } finally { 
                loader.classList.add('hidden'); 
            }
        }

        function renderPagination(page, total) {
            const container = document.getElementById('pagination-container');
            container.innerHTML = `
                <button onclick="changePage(${page - 1})" ${page === 1 ? 'disabled' : ''} class="px-5 py-2 border-2 rounded-xl text-sm font-bold disabled:opacity-20 hover:bg-white transition-all">
                    <i class="fas fa-chevron-left mr-2"></i>上一页
                </button>
                <div class="bg-white/80 backdrop-blur px-6 py-2 rounded-xl border border-gray-200 text-sm font-bold">
                    <span class="text-blue-600">第 ${page} 页</span> / <span class="text-gray-400">共 ${total} 页</span>
                </div>
                <button onclick="changePage(${page + 1})" ${page >= total ? 'disabled' : ''} class="px-5 py-2 border-2 rounded-xl text-sm font-bold hover:bg-white transition-all">
                    下一页<i class="fas fa-chevron-right ml-2"></i>
                </button>
            `;
        }

        function changePage(newPage) {
            if (newPage < 1) return;
            currentPage = newPage;
            fetchProducts(currentCatId, newPage);
            document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function runAiAnalysis() {
            const modal = document.getElementById('ai-modal');
            const content = document.getElementById('ai-content');
            modal.classList.remove('hidden');
            content.innerHTML = `<div class="flex flex-col items-center py-10"><div class="loading-spinner mb-4"></div><p class="text-blue-600 font-bold animate-pulse">AI 智脑正在深度解析 【${currentCatName}】...</p></div>`;
            try {
                const res = await fetch(`${API_BASE}/ai/analyze-market?country_id=1&category_name=${currentCatName}`, { method: 'POST' });
                const data = await res.json();
                content.innerText = data.analysis;
            } catch(e) { content.innerText = "演示模式：该品类在越南市场增速达 30%，建议重点关注。"; }
        }

        function closeAiModal() { document.getElementById('ai-modal').classList.add('hidden'); }

        setInterval(() => {
            const now = new Date();
            document.getElementById('realtime-clock').innerText = now.toLocaleString();
        }, 1000);

        switchModule('macro');
    </script>
